name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: cd apps/web && bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            apps/web/dist/
            apps/web/migrations/
            apps/web/wrangler.toml
            deploy.sh
          retention-days: 7

  # test:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: oven-sh/setup-bun@v2
  #       with:
  #         bun-version: latest
  #     - run: bun install --frozen-lockfile
  #     - run: cd apps/web && bun run test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build
          path: release-staging/

      - name: Package release bundle
        run: |
          cd release-staging
          chmod +x deploy.sh
          tar -czf ../statsfactory-${{ github.ref_name }}.tar.gz .
          cd ..
          # Also create a zip for Windows users
          cd release-staging && zip -r ../statsfactory-${{ github.ref_name }}.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            statsfactory-${{ github.ref_name }}.tar.gz
            statsfactory-${{ github.ref_name }}.zip
