<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    :root { --fg: #e5e7eb; --accent: #3b82f6; }
    @media (prefers-color-scheme: light) { :root { --fg: #1f2937; --accent: #2563eb; } }
  </style>
  <!-- Factory chimney -->
  <rect x="4" y="14" width="6" height="14" rx="1" fill="var(--fg)"/>
  <rect x="6" y="8" width="2" height="6" rx="0.5" fill="var(--fg)" opacity="0.7"/>
  <!-- Smoke puffs -->
  <circle cx="7" cy="6" r="1.5" fill="var(--fg)" opacity="0.3"/>
  <circle cx="8.5" cy="4" r="1.2" fill="var(--fg)" opacity="0.2"/>
  <!-- Bar chart -->
  <rect x="14" y="18" width="4" height="10" rx="0.5" fill="var(--accent)" opacity="0.6"/>
  <rect x="20" y="12" width="4" height="16" rx="0.5" fill="var(--accent)" opacity="0.8"/>
  <rect x="26" y="6" width="4" height="22" rx="0.5" fill="var(--accent)"/>
  <!-- Base line -->
  <rect x="2" y="28" width="28" height="1.5" rx="0.75" fill="var(--fg)" opacity="0.4"/>
</svg>
