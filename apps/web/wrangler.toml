name = "statsfactory"
compatibility_date = "2026-03-12"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

# ── Database ─────────────────────────────────────────────────────────────────
# D1 — zero latency, colocated with the Worker.
# For local dev: `just init` creates a local D1 database via miniflare.
# For production: `wrangler d1 create statsfactory` and paste the database_id.
[[d1_databases]]
binding = "DB"
database_name = "statsfactory"
database_id = "51c962c3-45b9-467c-baae-588a9bd7027f"
migrations_dir = "migrations"
# ⬆ Replace "local-dev" with your real database_id for production.
#   The deploy script handles this automatically.

[vars]
# Non-secret environment variables.
# For production, set secrets via `wrangler secret put`:
#   wrangler secret put CF_ACCESS_TEAM_DOMAIN
# For local dev, copy .dev.vars.example to .dev.vars (picked up automatically by wrangler).

[assets]
binding = "ASSETS"
directory = "./dist"

# Data retention cron — runs daily at 03:00 UTC.
# Invokes the scheduled handler which calls POST /v1/cron/retention internally.
# In dev mode: `wrangler dev --test-scheduled`, then curl http://localhost:8787/__scheduled
[triggers]
crons = ["0 3 * * *"]
